<body>

    <!-- NAVBAR -->

    <nav>

        <h1>THE RONZY</h1>

        <div>

            <a href="index.html">Home</a>

            <a href="tpu-cases.html">TPU Cases</a>

            <a href="drones.html">Drones</a>

        </div>

    </nav>

    <!-- TITLE -->

    <div class="title">

        <h2>YOUR CART</h2>

    </div>

    <!-- CART ITEMS -->

    <div class="cart-container" id="cart-container">

    </div>

    <!-- TOTAL -->

    <div class="total" id="total">

        Total: ₹0

    </div>

    <!-- ACTION BUTTONS -->

    <div class="actions">

        <button
        class="checkout-btn"
        onclick="checkoutWhatsApp()">

            WhatsApp Checkout

        </button>

        <button
        class="clear-btn"
        onclick="clearCart()">

            Clear Cart

        </button>

    </div>

    <!-- SCRIPT -->

    <script>

        let cart =
        JSON.parse(localStorage.getItem("cart")) || [];

        let cartContainer =
        document.getElementById("cart-container");

        let totalElement =
        document.getElementById("total");

        function displayCart(){

            cartContainer.innerHTML = "";

            let total = 0;

            if(cart.length === 0){

                cartContainer.innerHTML = `
                    <div class="empty">
                        Your cart is empty.
                    </div>
                `;

                totalElement.innerText =
                "Total: ₹0";

                return;

            }

            cart.forEach((item,index)=>{

                if(!item.quantity){
                    item.quantity = 1;
                }

                total += item.price * item.quantity;

                cartContainer.innerHTML += `

                <div class="cart-item">

                    <div class="cart-info">

                        <h3>${item.name}</h3>

                        <div class="price">
                            ₹${item.price}
                        </div>

                    </div>

                    <div class="quantity-controls">

                        <button onclick="decreaseQuantity(${index})">
                            -
                        </button>

                        <div class="quantity">
                            ${item.quantity}
                        </div>

                        <button onclick="increaseQuantity(${index})">
                            +
                        </button>

                    </div>

                    <button
                    class="remove-btn"
                    onclick="removeItem(${index})">

                        Remove

                    </button>

                </div>

                `;

            });

            totalElement.innerText =
            "Total: ₹" + total;

            localStorage.setItem(
                "cart",
                JSON.stringify(cart)
            );

        }

        function increaseQuantity(index){

            cart[index].quantity++;

            displayCart();

        }

        function decreaseQuantity(index){

            if(cart[index].quantity > 1){

                cart[index].quantity--;

            }

            displayCart();

        }

        function removeItem(index){

            cart.splice(index,1);

            displayCart();

        }

        function clearCart(){

            cart = [];

            localStorage.setItem(
                "cart",
                JSON.stringify(cart)
            );

            displayCart();

        }

        /* WHATSAPP CHECKOUT */

        function checkoutWhatsApp(){

            if(cart.length === 0){

                alert("Your cart is empty.");

                return;

            }

            let message =
            "Hello THE RONZY,%0A%0AI want to order:%0A%0A";

            let total = 0;

            cart.forEach((item)=>{

                let quantity = item.quantity || 1;

                total += item.price * quantity;

                message +=
                "• " +
                item.name +
                " x" +
                quantity +
                " - ₹" +
                (item.price * quantity) +
                "%0A";

            });

            message +=
            "%0ATotal: ₹" + total;

            let whatsappURL =
            "https://wa.me/263778100292?text=" + message;

            window.open(whatsappURL, "_blank");

        }

        displayCart();

    </script>

</body>

</html>
