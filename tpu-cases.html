<!DOCTYPE html>
<html>

<head>
    <title>TPU Phone Cases - The Ronzy</title>

    <style>

        body{
            margin:0;
            font-family:Arial;
            background:#111;
            color:white;
        }

        /* NAVBAR */

        nav{
            background:black;
            padding:20px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        nav h1{
            color:cyan;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin-left:20px;
        }

        /* PAGE TITLE */

        .title{
            text-align:center;
            padding:40px;
        }

        .title h2{
            font-size:40px;
            color:cyan;
        }

        /* PRODUCT GRID */

        .products{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:30px;
            padding:40px;
        }

        /* PRODUCT CARD */

        .card{
            background:#1a1a1a;
            border-radius:15px;
            overflow:hidden;
            transition:0.3s;
        }

        .card:hover{
            transform:scale(1.03);
        }

        .card img{
            width:100%;
            height:250px;
            object-fit:cover;
        }

        .card-content{
            padding:20px;
            text-align:center;
        }

        .card-content h3{
            margin-bottom:10px;
        }

        .price{
            color:cyan;
            font-size:22px;
            margin-bottom:15px;
        }

        button{
            background:cyan;
            border:none;
            padding:12px 25px;
            font-size:16px;
            cursor:pointer;
            border-radius:8px;
        }

        button:hover{
            background:white;
        }

    </style>

</head>

<body>

    <!-- NAVBAR -->

    <nav>

        <h1>THE RONZY</h1>

        <!-- PRODUCT 4 -->
