<!DOCTYPE html>
<html>

<head>
    <title>Delivery Drones - The Ronzy</title>

    <style>

        body{
            margin:0;
            font-family:Arial;
            background:#111;
            color:white;
        }

        /* NAVBAR */

        nav{
            background:black;
            padding:20px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        nav h1{
            color:cyan;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin-left:20px;
        }

        /* TITLE */

        .title{
            text-align:center;
            padding:50px;
        }

        .title h2{
            font-size:45px;
            color:cyan;
        }

        /* PRODUCT GRID */

        .products{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:30px;
            padding:40px;
        }

        /* PRODUCT CARD */

        .card{
            background:#1a1a1a;
            border-radius:15px;
            overflow:hidden;
            transition:0.3s;
        }

        .card:hover{
            transform:scale(1.03);
        }

        .card img{
            width:100%;
            height:250px;
            object-fit:cover;
        }

        .card-content{
            padding:20px;
            text-align:center;
        }

        .card-content h3{
            margin-bottom:10px;
        }

        .price{
            color:cyan;
            font-size:22px;
            margin-bottom:15px;
        }

        button{
            background:cyan;
            border:none;
            padding:12px 25px;
            font-size:16px;
            cursor:pointer;
            border-radius:8px;
        }

        button:hover{
            background:white;
        }

    </style>

</head>

<body>

    <!-- NAVBAR -->

    <nav>

        <h1>THE RONZY</h1>

        <div>
            <a href="index.html">Home</a>
            <a href="#">Drones</a>
            <a href="#">3D Prints</a>
            <a href="#">Electronics</a>
        </div>

    </nav>

    <!-- PAGE TITLE -->

    <div class="title">

        <h2>DELIVERY DRONES</h2>

        <p>Professional Smart Delivery Drone Systems</p>

    </div>

    <!-- PRODUCTS -->

    <div class="products">

        <!-- PRODUCT 1 -->

        <div class="card">

            <img src="https://images.unsplash.com/photo-1473968512647-3e447244af8f?w=800">

            <div class="card-content">

                <h3>Mini Delivery Drone</h3>

                <div class="price">₹45,000</div>

                <button>Buy Now</button>

            </div>

        </div>

        <!-- PRODUCT 2 -->

        <div class="card">

            <img src="https://images.unsplash.com/photo-1508614999368-9260051292e5?w=800">

            <div class="card-content">

                <h3>Cargo Delivery Drone</h3>

                <div class="price">₹89,000</div>

                <button>Buy Now</button>

            </div>

        </div>

        <!-- PRODUCT 3 -->

        <div class="card">

            <img src="https://images.unsplash.com/photo-1521405924368-64c5b84bec60?w=800">

            <div class="card-content">

                <h3>Industrial Delivery Drone</h3>

                <div class="price">₹1,45,000</div>

                <button>Buy Now</button>

            </div>

        </div>

        <!-- PRODUCT 4 -->

        <div class="card">

            <img src="https://images.unsplash.com/photo-1518770660439-4636190af475?w=800">

            <div class="card-content">

                <h3>AI Smart Drone</h3>

                <div class="price">₹2,10,000</div>

                <button>Buy Now</button>

            </div>

        </div>

    </div>

</body>

</html>
