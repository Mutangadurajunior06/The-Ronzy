<!DOCTYPE html>
<html>

<head>
    <title>The Ronzy</title>

    <style>

        body{
            margin:0;
            font-family:Arial;
            background:black;
            color:white;
        }

        /* NAVBAR */

        nav{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:20px 50px;
            background:#111;
            border-bottom:1px solid cyan;
        }

        .logo{
            font-size:30px;
            font-weight:bold;
            color:cyan;
            text-shadow:0 0 15px cyan;
        }

        nav ul{
            display:flex;
            list-style:none;
            gap:30px;
        }

        nav ul li{
            cursor:pointer;
            transition:0.3s;
        }

        nav ul li:hover{
            color:cyan;
        }

        /* HERO SECTION */

        .hero{
            text-align:center;
            padding-top:150px;
        }

        .hero h1{
            font-size:60px;
            margin-bottom:20px;
        }

        .hero p{
            font-size:22px;
            color:#ccc;
        }

        .hero button{
            margin-top:30px;
            padding:18px 40px;
            font-size:20px;
            border:none;
            background:cyan;
            cursor:pointer;
            border-radius:10px;
            transition:0.3s;
        }

        .hero button:hover{
            transform:scale(1.05);
            box-shadow:0 0 20px cyan;
        }

    </style>

</head>

<body>

    <!-- NAVBAR -->

    <nav>

        <div class="logo">
            THE RONZY
        </div>

        <ul>
            <li>Home</li>
            <li>Products</li>
            <li>About</li>
            <li>Contact</li>
        </ul>

    </nav>

    <!-- HERO SECTION -->

    <div class="hero">

        <h1>WELCOME TO THE RONZY</h1>

        <p>
            Tech • 3D Prints • Electronics • Drones
        </p>

        <button>
            Shop Now
        </button>

    </div>

</body>

</html>
