<script>

function searchProducts(){

    let input =
    document.getElementById("searchInput")
    .value
    .toLowerCase();

    /* TPU PRODUCTS */

    if(input.includes("transparent")){

        window.location.href =
        "tpu-cases.html#transparent-case";

    }

    else if(input.includes("gaming")){

        window.location.href =
        "tpu-cases.html#gaming-case";

    }

    else if(input.includes("shockproof")){

        window.location.href =
        "tpu-cases.html#shockproof-case";

    }

    else if(
        input.includes("black")
    ){

        window.location.href =
        "tpu-cases.html#black-case";

    }

    /* TPU GENERAL */

    else if(
        input.includes("tpu") ||
        input.includes("phone") ||
        input.includes("case")
    ){

        window.location.href =
        "tpu-cases.html";

    }

    /* DRONES */

    else if(
        input.includes("drone") ||
        input.includes("delivery") ||
        input.includes("fpv")
    ){

        window.location.href =
        "drones.html";

    }

    else{

        alert("No matching products found.");

    }

}

</script>
